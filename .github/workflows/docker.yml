name: Docker Image CI

on:
    push:
        branches: ["**"]
    workflow_dispatch:

jobs:
    docker-build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Login to ghcr.io
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.repository_owner}}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: lowercase github.repository
              run: echo "IMAGE_NAME=${GITHUB_REPOSITORY@L}" >> ${GITHUB_ENV}

            - name: Determine version tag
              id: version
              run: |
                  VERSION=$(jq -r '.version' package.json)
                  echo "version_tag=${VERSION}" >> $GITHUB_OUTPUT
                  echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

            - name: Build and push (master)
              if: github.ref == 'refs/heads/master'
              uses: docker/build-push-action@v6
              with:
                  file: Dockerfile
                  push: true
                  platforms: linux/amd64,linux/arm64
                  tags: |
                      ghcr.io/${{ env.IMAGE_NAME }}:latest
                      ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version_tag }}

            - name: Build and push (nightly)
              if: github.ref != 'refs/heads/master'
              uses: docker/build-push-action@v6
              with:
                  file: Dockerfile
                  push: true
                  platforms: linux/amd64,linux/arm64
                  tags: |
                      ghcr.io/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
                      ghcr.io/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-${{ steps.version.outputs.short_sha }}
